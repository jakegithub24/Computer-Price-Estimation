{% extends "base.html" %}

{% block title %}Error - Laptop Price Predictor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-danger">
            <div class="card-body text-center py-5">
                <h1 class="display-1 text-danger">❌</h1>
                <h3 class="text-danger">An Error Occurred</h3>
                <p class="text-muted">{{ error }}</p>
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go Back Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
